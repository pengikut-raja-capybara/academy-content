name: Generate Table of Contents

on:
  push:
    paths:
      - 'content/modules/**'
  schedule:
    - cron: '0 18 * * 0' # Setiap Senin jam 1 malam WIB (Minggu 18:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run TOC Generator
        run: node scripts/generate-toc.mjs

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add content-index.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update content index [skip ci]" && git push)
