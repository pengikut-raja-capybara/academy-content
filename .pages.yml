- name: modules
    label: 📚 Modules (Materi Kelas)
    type: collection
    path: content/modules
    format: json
    filename: "{fields.slug}.json"
    fields:
      # ==========================================
      # 1. INFORMASI MODUL UMUM
      # ==========================================
      - name: id
        label: 🔑 Module ID
        type: string # PERBAIKAN: Pages CMS tidak punya type 'uuid', gunakan 'string'
        description: "Format unik, contoh: mod-html"
      - name: slug
        label: 🔗 Slug URL
        type: string
        required: true
        description: "Huruf kecil & strip, contoh: html-dasar"
      - name: title
        label: 📌 Judul Modul
        type: string
        required: true
      - name: description
        label: 📝 Deskripsi Modul
        type: text

      # ==========================================
      # 2. TUGAS AKHIR (SUBMISSION)
      # ==========================================
      - name: submissionUrl
        label: 🎯 [TUGAS AKHIR] Link Pengumpulan Form
        type: string
        description: "Kosongkan jika tidak ada tugas akhir. Contoh: https://forms.google..."
      - name: submissionDescription
        label: 🎯 [TUGAS AKHIR] Instruksi Pengerjaan
        type: rich-text
      - name: submissionAttachments
        label: 🎯 [TUGAS AKHIR] File Lampiran (Template/Soal)
        type: object
        list: true
        fields:
          - name: title
            label: Nama File
            type: string
          - name: file
            label: 📤 Upload File Baru
            type: file 
          - name: url
            label: 🔗 Link URL Eksternal
            type: string
            description: "Isi URL jika file ada di luar (Google Drive, dll)"
          - name: type
            label: Format File
            type: select
            options: [ pdf, zip, image, code, link ]

      # ==========================================
      # 3. DAFTAR PELAJARAN (LESSONS)
      # ==========================================
      - name: lessons
        label: 📖 Daftar Pelajaran (Lessons)
        type: object
        list: true
        fields:
          - name: id
            label: 🔑 Lesson ID
            type: string # PERBAIKAN: Pages CMS tidak punya type 'uuid', gunakan 'string'
            description: "Contoh: html-1"
          - name: slug
            label: 🔗 Slug Lesson
            type: string
            required: true
          - name: title
            label: 📌 Judul Pelajaran
            type: string
            required: true
          - name: type
            label: 🔀 TIPE MATERI (PENTING)
            type: select
            required: true
            options:
              - label: "▶️ Video Pembelajaran"
                value: "video"
              - label: "📄 Teks / Artikel"
                value: "text"
              - label: "📝 Evaluasi / Kuis"
                value: "exercise"
          - name: description
            label: 📝 Deskripsi Singkat Materi
            type: text

          # --- BAGIAN KHUSUS VIDEO ---
          - name: video
            label: "▶️ [KHUSUS VIDEO] YouTube ID"
            type: string
            description: "Contoh: NBZ9Ro6UKV8"
          - name: duration
            label: "⏳ Estimasi Durasi (Menit)"
            type: number
          - name: minWatchPercentage
            label: "📈 Syarat Tontonan Lulus (%)"
            type: number
            description: "Biarkan kosong untuk default 90%"

          # --- BAGIAN KHUSUS TEKS/ARTIKEL ---
          - name: content
            label: "📄 [KHUSUS TEKS] Isi Materi Artikel"
            type: rich-text

          # --- BAGIAN KHUSUS KUIS/EVALUASI ---
          - name: minScorePercentage
            label: "💯 [KHUSUS KUIS] Syarat Nilai Kelulusan (%)"
            type: number
            description: "Default: 80"
          - name: exercise
            label: "📝 [KHUSUS KUIS] Pengaturan Pertanyaan"
            type: object
            fields:
              - name: type
                label: Format Evaluasi
                type: select
                options: [ quiz, code ]
              - name: questions
                label: Daftar Pertanyaan Kuis
                type: object
                list: true
                fields:
                  - name: id
                    label: ID Pertanyaan
                    type: string # PERBAIKAN: Gunakan 'string'
                  - name: question
                    label: Soal Pertanyaan
                    type: text
                  
                  # PERBAIKAN FATAL: Di Pages CMS, array string sederhana menggunakan type: string + list: true
                  - name: options
                    label: Pilihan Jawaban (A, B, C, D)
                    type: string
                    list: true
                    description: "Tambahkan teks pilihan jawaban secara berurutan"

                  - name: correctAnswer
                    label: Indeks Jawaban Benar
                    type: number
                    description: "0 = Opsi 1, 1 = Opsi 2, dst"
                  - name: explanation
                    label: Penjelasan Jawaban (Opsional)
                    type: text

          # --- TUGAS CODE ---
          - name: initialCode
            label: "💻 [Tugas Code] Kode Awal (Starter)"
            type: code # Pastikan versi Pages CMS kamu mendukung type 'code', jika masih error ubah ke 'text'
          - name: solution
            label: "💻 [Tugas Code] Kode Solusi"
            type: code

          # --- BAGIAN UMUM ---
          # PERBAIKAN FATAL: Array string menggunakan type: string + list: true
          - name: checklist
            label: "✅ To-Do List (Tugas Praktik)"
            type: string
            list: true
            description: "Daftar checklist yang harus dicentang user"

          - name: attachments
            label: 📎 File Lampiran Materi Tambahan
            type: object
            list: true
            fields:
              - name: title
                label: Nama File
                type: string
              - name: file
                label: 📤 Upload File Baru
                type: file
              - name: url
                label: 🔗 Link URL Eksternal
                type: string
              - name: type
                label: Format File
                type: select
                options: [ pdf, zip, image, code, link ]