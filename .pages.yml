content:
  - name: modules
    label: 📚 Modules (Materi Kelas)
    type: collection
    path: content/modules
    format: json
    filename: "{fields.slug}.json"
    fields:
      # ==========================================
      # 1. INFORMASI MODUL UMUM
      # ==========================================
      - name: id
        label: 🔑 Module ID
        type: string
        required: true
        description: "Format unik, contoh: mod-html"
      - name: slug
        label: 🔗 Slug URL
        type: string
        required: true
        description: "Huruf kecil & strip, contoh: html-dasar"
      - name: title
        label: 📌 Judul Modul
        type: string
        required: true
      - name: description
        label: 📝 Deskripsi Modul
        type: text

      # ==========================================
      # 2. TUGAS AKHIR (SUBMISSION)
      # ==========================================
      - name: submissionUrl
        label: 🎯 [TUGAS AKHIR] Link Pengumpulan Form
        type: string
        description: "Kosongkan jika tidak ada tugas akhir. Contoh: https://forms.google..."
      - name: submissionDescription
        label: 🎯 [TUGAS AKHIR] Instruksi Pengerjaan
        type: rich-text
      - name: submissionAttachments
        label: 🎯 [TUGAS AKHIR] File Lampiran (Template/Soal)
        type: object
        list: true
        fields:
          - name: title
            label: Nama File
            type: string
          - name: url
            label: Link URL File
            type: string
          - name: type
            label: Format File
            type: select
            options: [pdf, zip, image, code, link]

      # ==========================================
      # 3. DAFTAR PELAJARAN (LESSONS)
      # ==========================================
      - name: lessons
        label: 📖 Daftar Pelajaran (Lessons)
        type: object
        list: true
        fields:
          - name: id
            label: 🔑 Lesson ID
            type: string
            required: true
            description: "Contoh: html-1"
          - name: slug
            label: 🔗 Slug Lesson
            type: string
            required: true
          - name: title
            label: 📌 Judul Pelajaran
            type: string
            required: true
          - name: type
            label: 🔀 TIPE MATERI (PENTING)
            type: select
            required: true
            options: 
              - label: "▶️ Video Pembelajaran"
                value: "video"
              - label: "📄 Teks / Artikel"
                value: "text"
              - label: "📝 Evaluasi / Kuis"
                value: "exercise"
          - name: description
            label: 📝 Deskripsi Singkat Materi
            type: text

          # --- BAGIAN KHUSUS VIDEO ---
          - name: video
            label: "▶️ [KHUSUS VIDEO] YouTube ID"
            type: string
            description: "Contoh: NBZ9Ro6UKV8 (Bukan URL lengkap)"
          - name: duration
            label: "⏳ Estimasi Durasi (Menit)"
            type: number
          - name: minWatchPercentage
            label: "📈 Syarat Tontonan Lulus (%)"
            type: number
            description: "Biarkan kosong untuk default 90%"

          # --- BAGIAN KHUSUS TEKS/ARTIKEL ---
          - name: content
            label: "📄 [KHUSUS TEKS] Isi Materi Artikel"
            type: rich-text
            description: "Tulis materi lengkap di sini jika tipe materi adalah Teks"

          # --- BAGIAN KHUSUS KUIS/EVALUASI ---
          - name: minScorePercentage
            label: "💯 [KHUSUS KUIS] Syarat Nilai Kelulusan (%)"
            type: number
            description: "Batas nilai minimum untuk lulus. Default: 80"
          - name: exercise
            label: "📝 [KHUSUS KUIS] Pengaturan Pertanyaan"
            type: object
            fields:
              - name: type
                label: Format Evaluasi
                type: select
                options: [quiz, code]
              - name: questions
                label: Daftar Pertanyaan Kuis
                type: object
                list: true
                fields:
                  - name: id
                    label: ID Pertanyaan (Otomatis)
                    type: string
                  - name: question
                    label: Soal Pertanyaan
                    type: text
                  
                  # PERBAIKAN FATAL: Dibuat string[] murni
                  - name: options
                    label: Pilihan Jawaban (A, B, C, D)
                    type: list
                    description: "Tambahkan teks pilihan jawaban secara berurutan"
                  
                  - name: correctAnswer
                    label: Indeks Jawaban Benar
                    type: number
                    description: "Mulai dari 0 (0 = Opsi 1, 1 = Opsi 2, dst)"
                  - name: explanation
                    label: Penjelasan Jawaban (Opsional)
                    type: text

              # Menggunakan code editor bawaan CMS
              - name: initialCode
                label: "💻 [Tugas Code] Kode Awal (Starter)"
                type: code 
              - name: solution
                label: "💻 [Tugas Code] Kode Solusi"
                type: code

          # --- BAGIAN UMUM (BISA DIGUNAKAN SEMUA TIPE) ---
          # PERBAIKAN FATAL: Dibuat string[] murni
          - name: checklist
            label: "✅ To-Do List (Tugas Praktik)"
            type: list
            description: "Daftar checklist yang harus dicentang user"

          - name: attachments
            label: 📎 File Lampiran Materi Tambahan
            type: object
            list: true
            fields:
              - name: title
                label: Nama File
                type: string
              - name: url
                label: Link File
                type: string
              - name: type
                label: Format File
                type: select
                options: [pdf, zip, image, code, link]