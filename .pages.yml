# Pastikan konfigurasi media ada agar fitur UPLOAD berfungsi
media:
  input: public/uploads
  output: /uploads

content:
  - name: modules
    label: Modules
    type: collection
    path: content/modules
    format: json
    filename: "{fields.slug}.json"
    fields:
      # ==========================================
      # 1. INFORMASI MODUL UMUM
      # ==========================================
      - name: id
        label: Module ID
        type: uuid
        description: "Format unik, contoh: mod-html"
      - name: slug
        label: Slug
        type: string
        required: true
        description: "Huruf kecil & strip, contoh: html-dasar"
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: text

      # ==========================================
      # 2. TUGAS AKHIR (SUBMISSION)
      # ==========================================
      - name: submissionUrl
        label: Submission URL
        type: string
        description: "Kosongkan jika tidak ada tugas akhir."
      - name: submissionDescription
        label: Submission Description
        type: rich-text
      - name: submissionAttachments
        label: Submission Attachments
        type: object
        list: true
        fields:
          - name: title
            label: Title
            type: string
          - name: file
            label: File
            type: file
          - name: url
            label: URL
            type: string
          - name: type
            label: Type
            type: select
            options: 
              values: [pdf, zip, image, code, link]

      # ==========================================
      # 3. DAFTAR PELAJARAN (LESSONS)
      # ==========================================
      - name: lessons
        label: Lessons
        type: object
        list: true
        fields:
          - name: id
            label: Lesson ID
            type: uuid
            description: "Contoh: html-1"
          - name: title
            label: Title
            type: string
            required: true
          - name: type
            label: Type
            type: select
            required: true
            options:
              values:
                - name: "video"
                  label: "Video"
                - name: "text"
                  label: "Text"
                - name: "exercise"
                  label: "Exercise"
          - name: description
            label: Description
            type: text

          - name: video
            label: Video ID (YouTube)
            type: string
          - name: duration
            label: Duration (Mins)
            type: number
          - name: minWatchPercentage
            label: Min. Watch (%)
            type: number

          - name: content
            label: Content
            type: rich-text

          - name: minScorePercentage
            label: Min. Score (%)
            type: number
          - name: exercise
            label: Exercise Config
            type: object
            fields:
              - name: type
                label: Type
                type: select
                options: 
                  values: [quiz, code]
              - name: questions
                label: Questions
                type: object
                list: true
                fields:
                  - name: id
                    label: ID
                    type: uuid
                  - name: question
                    label: Question
                    type: text
                  
                  # KUNCI PERBAIKAN: Di Pages CMS tidak ada 'type: list'. 
                  # Gunakan type: string dengan tambahan list: true
                  - name: options
                    label: Options
                    type: string
                    list: true
                    description: "Tekan enter untuk menambah pilihan jawaban"
                    
                  - name: correctAnswer
                    label: Correct Answer Index
                    type: number
                  - name: explanation
                    label: Explanation
                    type: text

              # Menggunakan code editor bawaan CMS
              - name: initialCode
                label: Initial Code
                type: code 
              - name: solution
                label: Solution Code
                type: code

          # KUNCI PERBAIKAN SAMA: Gunakan type: string dan list: true
          - name: checklist
            label: Checklist
            type: string
            list: true

          - name: attachments
            label: Attachments
            type: object
            list: true
            fields:
              - name: title
                label: Title
                type: string
              - name: file
                label: File
                type: file
              - name: url
                label: URL
                type: string
              - name: type
                label: Type
                type: select
                options: 
                  values: [pdf, zip, image, code, link]