# Pastikan konfigurasi media ada agar fitur UPLOAD berfungsi
media:
  input: public/uploads
  output: /uploads

content:
  - name: modules
    label: 📚 Modules (Materi Kelas)
    type: collection
    path: content/modules
    format: json
    filename: "{fields.slug}.json"
    fields:
      # ==========================================
      # 1. INFORMASI MODUL UMUM
      # ==========================================
      - name: id
        label: 🔑 Module ID
        type: uuid
        description: "Format unik, contoh: mod-html"
      - name: slug
        label: 🔗 Slug URL
        type: string
        required: true
        description: "Huruf kecil & strip, contoh: html-dasar"
      - name: title
        label: 📌 Judul Modul
        type: string
        required: true
      - name: description
        label: 📝 Deskripsi Modul
        type: text

      # ==========================================
      # 2. TUGAS AKHIR (SUBMISSION)
      # ==========================================
      - name: submissionUrl
        label: 🎯 [TUGAS AKHIR] Link Pengumpulan Form
        type: string
        description: "Kosongkan jika tidak ada tugas akhir."
      - name: submissionDescription
        label: 🎯 [TUGAS AKHIR] Instruksi Pengerjaan
        type: rich-text
      - name: submissionAttachments
        label: 🎯 [TUGAS AKHIR] File Lampiran (Template/Soal)
        type: object
        list: true
        fields:
          - name: title
            label: Nama File
            type: string
          - name: file
            label: 📤 Upload File Baru
            type: file
          - name: url
            label: 🔗 Link URL Eksternal
            type: string
          - name: type
            label: Format File
            type: select
            options: 
              values: [pdf, zip, image, code, link]

      # ==========================================
      # 3. DAFTAR PELAJARAN (LESSONS)
      # ==========================================
      - name: lessons
        label: 📖 Daftar Pelajaran (Lessons)
        type: object
        list: true
        fields:
          - name: id
            label: 🔑 Lesson ID
            type: uuid
            description: "Contoh: html-1"
          - name: slug
            label: 🔗 Slug Lesson
            type: string
            required: true
          - name: title
            label: 📌 Judul Pelajaran
            type: string
            required: true
          - name: type
            label: 🔀 TIPE MATERI
            type: select
            required: true
            options:
              - label: "▶️ Video Pembelajaran"
                value: "video"
              - label: "📄 Teks / Artikel"
                value: "text"
              - label: "📝 Evaluasi / Kuis"
                value: "exercise"
          - name: description
            label: 📝 Deskripsi Singkat Materi
            type: text

          - name: video
            label: "▶️ [KHUSUS VIDEO] YouTube ID"
            type: string
          - name: duration
            label: "⏳ Estimasi Durasi (Menit)"
            type: number
          - name: minWatchPercentage
            label: "📈 Syarat Tontonan Lulus (%)"
            type: number

          - name: content
            label: "📄 [KHUSUS TEKS] Isi Materi Artikel"
            type: rich-text

          - name: minScorePercentage
            label: "💯 [KHUSUS KUIS] Syarat Nilai Kelulusan (%)"
            type: number
          - name: exercise
            label: "📝 [KHUSUS KUIS] Pengaturan Pertanyaan"
            type: object
            fields:
              - name: type
                label: Format Evaluasi
                type: select
                options: 
                  values: [quiz, code]
              - name: questions
                label: Daftar Pertanyaan Kuis
                type: object
                list: true
                fields:
                  - name: id
                    label: ID Pertanyaan
                    type: uuid
                  - name: question
                    label: Soal Pertanyaan
                    type: text
                  
                  # KUNCI PERBAIKAN: Di Pages CMS tidak ada 'type: list'. 
                  # Gunakan type: string dengan tambahan list: true
                  - name: options
                    label: Pilihan Jawaban (A, B, C, D)
                    type: string
                    list: true
                    description: "Tekan enter untuk menambah pilihan jawaban"
                    
                  - name: correctAnswer
                    label: Indeks Jawaban Benar (0, 1, 2, dst)
                    type: number
                  - name: explanation
                    label: Penjelasan Jawaban (Opsional)
                    type: text

          # KUNCI PERBAIKAN SAMA: Gunakan type: string dan list: true
          - name: checklist
            label: "✅ To-Do List (Tugas Praktik)"
            type: string
            list: true

          - name: attachments
            label: 📎 File Lampiran Materi Tambahan
            type: object
            list: true
            fields:
              - name: title
                label: Nama File
                type: string
              - name: file
                label: 📤 Upload File Baru
                type: file
              - name: url
                label: 🔗 Link URL Eksternal
                type: string
              - name: type
                label: Format File
                type: select
                options: 
                  values: [pdf, zip, image, code, link]